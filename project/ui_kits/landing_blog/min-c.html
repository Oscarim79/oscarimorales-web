<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>C · Casi nada</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  /* Variant C — Casi nada
     Header micro. Un título. Una lista. Una sola intervención de color
     en el hover. Prueba de cuánto se puede quitar. */
  body {
    background: var(--crema-50);
    color: var(--noche-800);
    font-family: var(--font-sans);
    margin: 0;
  }
  .wrap { width: 100%; max-width: 760px; margin: 0 auto; padding: 0 32px; box-sizing: border-box; }

  /* Nav — un solo renglón */
  .nav {
    padding: 32px 0;
  }
  .nav__inner {
    display: flex; align-items: baseline; gap: 18px;
    font-family: var(--font-sans); font-size: 14px;
  }
  .nav__brand {
    font-weight: 600; color: var(--noche-800);
    letter-spacing: -0.003em;
  }
  .nav__links { margin-left: auto; display: flex; gap: 22px; }
  .nav__link {
    color: var(--niebla-600); text-decoration: none;
    font-weight: 400;
  }
  .nav__link:hover { color: var(--terracota-600); }

  /* Hero — un título, nada más. */
  .hero {
    padding: 120px 0 80px;
  }
  .hero__title {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 38px; line-height: 1.18;
    letter-spacing: -0.018em;
    color: var(--noche-800);
    margin: 0;
    max-width: 22ch;
  }
  .hero__title-muted { color: var(--niebla-500); }

  /* Lista — texto plano, sin grids, sin meta destacada */
  .list {
    padding-bottom: 100px;
  }
  .list__entry {
    display: flex; align-items: baseline; gap: 18px;
    padding: 14px 0;
    text-decoration: none;
    color: inherit;
    font-family: var(--font-sans);
    border-bottom: 1px solid transparent;
  }
  .list__year {
    flex: 0 0 auto;
    font-size: 13px; font-weight: 400;
    color: var(--niebla-500);
    font-variant-numeric: tabular-nums;
    width: 44px;
  }
  .list__year--same { color: transparent; }
  .list__title {
    flex: 1 1 auto;
    font-size: 16px; font-weight: 400; line-height: 1.4;
    color: var(--noche-800);
    margin: 0;
    letter-spacing: -0.003em;
  }
  .list__entry:hover .list__title {
    color: var(--terracota-600);
  }

  /* Separadores tenues de año cuando cambia */
  .list__entry--new-year {
    border-top: 1px solid rgba(13, 27, 42, 0.08);
    padding-top: 24px;
    margin-top: 10px;
  }

  /* Footer */
  .footer {
    padding: 60px 0 40px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 400;
    color: var(--niebla-600);
  }
  .footer__row { display: flex; justify-content: space-between; gap: 18px; }
  .footer a { color: inherit; text-decoration: none; }
  .footer a:hover { color: var(--terracota-600); }
</style>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav__inner">
      <span class="nav__brand">Oscar I. Morales</span>
      <div class="nav__links">
        <a class="nav__link" href="#">Boletín</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="wrap">
      <h1 class="hero__title">
        Escritos. <span class="hero__title-muted">Sobre la fe, la familia y la vida común &mdash; desde 2014.</span>
      </h1>
    </div>
  </section>

  <section class="list">
    <div class="wrap" id="list-root"></div>
  </section>

  <footer class="footer">
    <div class="wrap footer__row">
      <span>Oscar I. Morales &middot; Guatemala</span>
      <a href="mailto:me@oscarimorales.com">me@oscarimorales.com</a>
    </div>
  </footer>

  <script src="posts-data.js"></script>
  <script>
    const root = document.getElementById('list-root');
    let lastYear = null;
    POSTS.forEach(p => {
      const year = Number(p.date.slice(0, 4));
      const isNew = year !== lastYear;
      const a = document.createElement('a');
      a.className = 'list__entry' + (isNew && lastYear !== null ? ' list__entry--new-year' : '');
      a.href = p.url;
      a.target = '_blank';
      a.rel = 'noopener';
      const yearCls = isNew ? 'list__year' : 'list__year list__year--same';
      a.innerHTML = `
        <span class="${yearCls}">${year}</span>
        <h3 class="list__title">${p.title}</h3>`;
      root.appendChild(a);
      lastYear = year;
    });
  </script>
</body>
</html>
