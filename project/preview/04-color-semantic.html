<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 24px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .label {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
  }
  .pair { display: flex; align-items: center; gap: 10px; font-family: var(--font-sans); font-size: 12px; color: var(--fg); }
  .chip { width: 28px; height: 28px; border-radius: 6px; box-shadow: var(--shadow-inset-hairline); }
  .token { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--niebla-700); }
</style>
</head>
<body>
  <div class="card">
    <div class="group">
      <div class="label">Semánticos — superficie</div>
      <div class="pair"><span class="chip" style="background:var(--bg)"></span> bg <span class="token">--crema-100</span></div>
      <div class="pair"><span class="chip" style="background:var(--bg-elevated)"></span> bg-elevated <span class="token">--crema-50</span></div>
      <div class="pair"><span class="chip" style="background:var(--bg-sunken)"></span> bg-sunken <span class="token">--crema-200</span></div>
      <div class="pair"><span class="chip" style="background:var(--bg-invert)"></span> bg-invert <span class="token">--noche-800</span></div>
    </div>
    <div class="group">
      <div class="label">Semánticos — texto y acento</div>
      <div class="pair"><span class="chip" style="background:var(--fg)"></span> fg <span class="token">--noche-800</span></div>
      <div class="pair"><span class="chip" style="background:var(--fg-muted)"></span> fg-muted <span class="token">--niebla-700</span></div>
      <div class="pair"><span class="chip" style="background:var(--accent)"></span> accent <span class="token">--terracota-500</span></div>
      <div class="pair"><span class="chip" style="background:var(--gilt)"></span> gilt <span class="token">--dorado-500</span></div>
    </div>
  </div>
</body>
</html>
