<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 26px 32px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-descriptor); font-weight: 800;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    font-size: 12px;
    padding: 14px 22px;
    border-radius: 2px;
    border: none; cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast), box-shadow var(--transition-fast);
  }
  .btn--primary { background: var(--terracota-500); color: var(--crema-50); }
  .btn--primary:hover { background: var(--terracota-600); }
  .btn--ghost {
    background: transparent; color: var(--noche-800);
    box-shadow: inset 0 0 0 1px var(--noche-800);
  }
  .btn--ghost:hover { background: var(--noche-800); color: var(--crema-50); }
  .btn--text {
    background: transparent; color: var(--terracota-600);
    padding: 14px 0;
    border-bottom: 1px solid var(--terracota-600);
    border-radius: 0;
  }
  .btn--gilt {
    background: var(--noche-800); color: var(--crema-50);
    box-shadow: inset 0 -2px 0 var(--dorado-500);
  }
  .lbl {
    font-family: var(--font-descriptor); font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600); width: 110px; flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><span class="lbl">Primario</span>
      <button class="btn btn--primary">Suscribirme</button>
      <button class="btn btn--primary">Leer ensayo →</button>
    </div>
    <div class="row"><span class="lbl">Fantasma</span>
      <button class="btn btn--ghost">Sobre Oscar</button>
      <button class="btn btn--ghost">Todos los temas</button>
    </div>
    <div class="row"><span class="lbl">Texto</span>
      <button class="btn btn--text">Continuar leyendo</button>
    </div>
    <div class="row"><span class="lbl">Noche · dorado</span>
      <button class="btn btn--gilt">Reservar lectura</button>
    </div>
  </div>
</body>
</html>
