<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); padding: 8px; }
  .card { padding: 32px; display: flex; gap: 22px; align-items: center; }
  .tile {
    flex: 1;
    height: 92px;
    background: var(--bg-elevated);
    border-radius: var(--radius-md);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
  }
  .lbl {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
  }
  .px { font-family: var(--font-sans); font-size: 12px; color: var(--noche-800); font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="tile" style="box-shadow: var(--shadow-sm);"><span class="lbl">sm</span><span class="px">chips, input</span></div>
    <div class="tile" style="box-shadow: var(--shadow-md);"><span class="lbl">md</span><span class="px">cards</span></div>
    <div class="tile" style="box-shadow: var(--shadow-lg);"><span class="lbl">lg</span><span class="px">overlays</span></div>
  </div>
</body>
</html>
