<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 24px 32px; }
  .scale-label {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
    margin-bottom: 8px;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    height: 50px;
    margin-bottom: 12px;
  }
  .step {
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 6px;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 700;
    color: var(--crema-100);
    border-radius: 3px;
  }
  .step.light { color: var(--noche-800); }
</style>
</head>
<body>
  <div class="card">
    <div class="scale-label">Crema — escala</div>
    <div class="row">
      <div class="step light" style="background:#FBF8F3">50</div>
      <div class="step light" style="background:#F5F0E8">100</div>
      <div class="step light" style="background:#ECE4D5">200</div>
      <div class="step light" style="background:#DDD1BC">300</div>
      <div class="step light" style="background:#C7B89E">400</div>
      <div class="step light" style="background:#A89679">500</div>
      <div class="step" style="background:#7E6E55">600</div>
    </div>
    <div class="scale-label">Dorado — escala</div>
    <div class="row">
      <div class="step light" style="background:#EEDFBE">100</div>
      <div class="step light" style="background:#DBC8A6">300</div>
      <div class="step light" style="background:#CBB287">400</div>
      <div class="step" style="background:#B89A6A">500</div>
      <div class="step" style="background:#A38659">600</div>
      <div class="step" style="background:#8E7549">700</div>
      <div class="step" style="background:#6B5836">800</div>
    </div>
    <div class="scale-label">Niebla — escala</div>
    <div class="row">
      <div class="step light" style="background:#DCE2E8">200</div>
      <div class="step light" style="background:#C0CAD3">300</div>
      <div class="step light" style="background:#A4B1BE">400</div>
      <div class="step" style="background:#8A9AAA">500</div>
      <div class="step" style="background:#748493">600</div>
      <div class="step" style="background:#5F6D7C">700</div>
      <div class="step" style="background:#3F4A56">800</div>
    </div>
  </div>
</body>
</html>
