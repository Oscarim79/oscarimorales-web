<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 28px 36px; }
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 18px; align-items: baseline; padding: 8px 0; }
  .meta {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
    padding-top: 6px;
  }
  .spec-mont {
    font-family: "Montserrat", system-ui, sans-serif;
    font-weight: 700;
    font-size: 78px;
    line-height: 1.02;
    letter-spacing: -0.022em;
    color: var(--noche-800);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="meta">Display · Montserrat · 78 · 700</div>
      <div class="spec-mont">Vivir despacio.</div>
    </div>
  </div>
</body>
</html>
