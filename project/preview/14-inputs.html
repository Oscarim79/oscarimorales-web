<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 26px 32px; display: flex; flex-direction: column; gap: 16px; }
  label.fld {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
    display: flex; flex-direction: column; gap: 8px;
  }
  input, textarea {
    font-family: var(--font-sans); font-size: 16px;
    color: var(--noche-800);
    background: var(--bg-elevated);
    border: none;
    border-bottom: 1px solid var(--rule-strong);
    padding: 10px 2px;
    transition: border-color var(--transition-fast);
    border-radius: 0;
    outline: none;
  }
  input:focus, textarea:focus { border-bottom-color: var(--terracota-500); }
  input::placeholder { color: var(--niebla-500); font-style: italic; }
</style>
</head>
<body>
  <div class="card">
    <label class="fld">Correo
      <input type="email" placeholder="tucorreo@ejemplo.com" />
    </label>
    <label class="fld">Nombre
      <input type="text" value="María Fernández" />
    </label>
    <label class="fld">¿Qué te trae aquí?
      <input type="text" placeholder="Una línea, sin presión." />
    </label>
  </div>
</body>
</html>
