<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .frame { padding: 0; display: grid; grid-template-columns: 1fr 1fr; min-height: 320px; }
  .tile { padding: 36px 32px; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
  .tile.crema { background: var(--crema-100); color: var(--noche-800); }
  .tile.noche { background: var(--noche-800); color: var(--crema-100); }
  .eb {
    font-family: var(--font-descriptor); font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    margin: 0;
  }
  .eb.terra { color: var(--terracota-500); }
  .eb.terra-l { color: var(--terracota-400); }
  h2 { font-family: var(--font-sans); font-weight: 700; font-size: 30px; line-height: 1.06; margin: 0; letter-spacing: -0.022em; }
  p { font-family: var(--font-serif); font-style: italic; font-size: 15px; line-height: 1.55; margin: 0; opacity: 0.78; }
</style>
</head>
<body>
  <div class="frame">
    <div class="tile crema">
      <p class="eb terra">MODO CREMA · DÍA</p>
      <h2>Vivir despacio en un mundo que corre.</h2>
      <p>El descanso es un acto de fe, no una recompensa.</p>
    </div>
    <div class="tile noche">
      <p class="eb terra-l">MODO NOCHE · CONTEMPLACIÓN</p>
      <h2>El silencio también predica.</h2>
      <p>Hay textos que sólo se entienden en penumbra.</p>
    </div>
  </div>
</body>
</html>
