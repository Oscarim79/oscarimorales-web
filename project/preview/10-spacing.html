<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 28px 32px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .bar { background: var(--terracota-300); height: 14px; border-radius: 2px; }
  .tag {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; color: var(--niebla-700);
    width: 92px; flex-shrink: 0;
  }
  .px { font-family: var(--font-sans); font-size: 11px; color: var(--niebla-700); }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><span class="tag">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
    <div class="row"><span class="tag">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
    <div class="row"><span class="tag">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
    <div class="row"><span class="tag">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
    <div class="row"><span class="tag">space-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
    <div class="row"><span class="tag">space-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
    <div class="row"><span class="tag">space-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
    <div class="row"><span class="tag">space-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
    <div class="row"><span class="tag">space-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
    <div class="row"><span class="tag">space-10</span><div class="bar" style="width:144px"></div><span class="px">144px</span></div>
  </div>
</body>
</html>
