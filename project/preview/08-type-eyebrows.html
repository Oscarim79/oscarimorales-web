<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
  .label {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
  }
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="label" style="margin-bottom:10px;">Eyebrow — terracota</div>
      <p class="eyebrow">PASTOR · AUTOR · CONSEJERO BÍBLICO</p>
    </div>
    <div>
      <div class="label" style="margin-bottom:10px;">Eyebrow — dorado</div>
      <p class="eyebrow eyebrow--gilt">LECTURA DEL DOMINGO</p>
    </div>
    <div>
      <div class="label" style="margin-bottom:10px;">Eyebrow — niebla</div>
      <p class="eyebrow eyebrow--mist">EPISODIO 14 · 38 MIN</p>
    </div>
    <div>
      <div class="label" style="margin-bottom:10px;">Micro · 11</div>
      <p class="eyebrow eyebrow--micro" style="color:var(--niebla-600)">DESDE 2018 · MEDELLÍN</p>
    </div>
  </div>
</body>
</html>
