<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .frame { padding: 26px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card {
    background: var(--bg-elevated);
    box-shadow: var(--shadow-md), var(--shadow-inset-hairline);
    border-radius: var(--radius-md);
    padding: 22px 22px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .eb {
    font-family: var(--font-descriptor); font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--dorado-600);
    margin: 0;
  }
  .ttl { font-family: var(--font-sans); font-weight: 700; font-size: 22px; line-height: 1.14; letter-spacing: -0.014em; color: var(--noche-800); margin: 0; }
  .meta { font-family: var(--font-sans); font-size: 12px; color: var(--niebla-600); margin: 0; }
  .rule { height: 1px; width: 36px; background: var(--dorado-500); margin: 2px 0 4px; }
</style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <p class="eb">LECTURA · ENSAYO</p>
      <div class="rule"></div>
      <h3 class="ttl">Lo pequeño que sostiene lo grande.</h3>
      <p class="meta">8 min de lectura · publicado el 12 de marzo</p>
    </div>
    <div class="card">
      <p class="eb">EPISODIO 14</p>
      <div class="rule"></div>
      <h3 class="ttl">Cuando orar se vuelve difícil.</h3>
      <p class="meta">38 min · con Andrea Restrepo</p>
    </div>
  </div>
</body>
</html>
