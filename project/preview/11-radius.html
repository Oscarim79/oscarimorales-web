<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg); }
  .card { padding: 28px 32px; display: flex; gap: 18px; }
  .corner {
    flex: 1;
    aspect-ratio: 1.4 / 1;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-inset-hairline);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
  }
  .lbl {
    font-family: var(--font-descriptor);
    font-weight: 800; font-size: 10px;
    text-transform: uppercase; letter-spacing: var(--tracking-wider);
    color: var(--niebla-600);
  }
  .px { font-family: var(--font-sans); font-size: 12px; color: var(--noche-800); font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="corner" style="border-radius:2px;"><span class="lbl">xs</span><span class="px">2px</span></div>
    <div class="corner" style="border-radius:4px;"><span class="lbl">sm</span><span class="px">4px</span></div>
    <div class="corner" style="border-radius:8px;"><span class="lbl">md</span><span class="px">8px</span></div>
    <div class="corner" style="border-radius:14px;"><span class="lbl">lg</span><span class="px">14px</span></div>
    <div class="corner" style="border-radius:999px;"><span class="lbl">pill</span><span class="px">999px</span></div>
  </div>
</body>
</html>
