name: Compilar blog

# Cada vez que se agrega o edita un post (o el script de build), GitHub compila
# automáticamente posts-data.js, post-html.js, sitemap.xml y feed.xml, y los
# commitea de vuelta. Así publicar = solo agregar el .md en content/posts/
# (incluso desde la web/móvil de GitHub). Luego GitHub Pages publica solo.

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**'
      - 'scripts/build-posts.mjs'
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compilar posts
        run: node scripts/build-posts.mjs

      - name: Commitear archivos generados (si cambiaron)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -A: incluye también las páginas <slug>.html y las redirecciones
          # post-<n>.html que genera el build en la raíz.
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que commitear."
          else
            git commit -m "build: regenerar datos del blog [skip ci]"
            git push
          fi
